name: Generate Contribution Snake

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: 4444j99
          outputs: |
            assets/snake.svg
            assets/snake-dark.svg?palette=github-dark

      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Commit snake SVGs
        run: |
          mkdir -p assets
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/snake.svg assets/snake-dark.svg
          git diff --cached --quiet || git commit -m "chore: update contribution snake [skip ci]"
          git push
